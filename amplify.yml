# AWS Amplify Hosting build spec for HaviCA.
# - Backend: Amplify Gen2 deploy via `npx ampx pipeline-deploy` (CFN stack per branch).
# - Frontend: Next.js 16 SSR build on Bun. Amplify auto-detects Next and serves
#   via WEB_COMPUTE (SSR) platform — `.next` is the artifact base, no static export.
# - Bun is not pre-installed on Amplify build images, so we install via npm.

version: 1
backend:
  phases:
    build:
      commands:
        # Bun for parity with local dev (lockfile is bun.lock).
        - npm install -g bun@1
        - bun install --frozen-lockfile
        # Deploy the CFN stack for this branch and write amplify_outputs.json
        # to the project root, where the frontend imports it.
        - npx ampx pipeline-deploy --branch "$AWS_BRANCH" --app-id "$AWS_APP_ID"
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g bun@1
        - bun install --frozen-lockfile
    build:
      commands:
        - bun run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
