<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div style="display:flex;flex-direction:column;gap:12px;">
    <button style="background:#3478F6;color:#fff;border:none;padding:14px 20px;border-radius:999px;font-family:Inter,sans-serif;font-size:15px;font-weight:600;cursor:pointer;">Continuar</button>
    <button style="background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.16);padding:14px 20px;border-radius:999px;font-family:Inter,sans-serif;font-size:15px;font-weight:600;cursor:pointer;">Secundario</button>
    <button style="background:transparent;color:#4A90FF;border:none;padding:8px 0;font-family:Inter,sans-serif;font-size:15px;font-weight:500;cursor:pointer;text-align:left;">Limpiar conversación</button>
    <button style="background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);border:none;padding:14px 20px;border-radius:999px;font-family:Inter,sans-serif;font-size:15px;font-weight:600;cursor:not-allowed;">Disabled</button>
  </div>
</div>
</body></html>
