<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div style="display:flex;gap:16px;align-items:center;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:60px;height:60px;background:#1A1A1A;border:1px solid rgba(255,255,255,0.16);border-radius:0;"></div><div style="font-size:10px;color:rgba(255,255,255,0.5);font-family:ui-monospace,Menlo,monospace;">0</div><div style="font-size:10px;color:rgba(255,255,255,0.7);">sections</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:60px;height:60px;background:#1A1A1A;border:1px solid rgba(255,255,255,0.16);border-radius:8px;"></div><div style="font-size:10px;color:rgba(255,255,255,0.5);font-family:ui-monospace,Menlo,monospace;">8</div><div style="font-size:10px;color:rgba(255,255,255,0.7);">badge</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:60px;height:60px;background:#1A1A1A;border:1px solid rgba(255,255,255,0.16);border-radius:12px;"></div><div style="font-size:10px;color:rgba(255,255,255,0.5);font-family:ui-monospace,Menlo,monospace;">12</div><div style="font-size:10px;color:rgba(255,255,255,0.7);">bubble</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:60px;height:60px;background:#1A1A1A;border:1px solid rgba(255,255,255,0.16);border-radius:16px;"></div><div style="font-size:10px;color:rgba(255,255,255,0.5);font-family:ui-monospace,Menlo,monospace;">16</div><div style="font-size:10px;color:rgba(255,255,255,0.7);">sheet</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:120px;height:60px;background:#1A1A1A;border:1px solid rgba(255,255,255,0.16);border-radius:999px;"></div><div style="font-size:10px;color:rgba(255,255,255,0.5);font-family:ui-monospace,Menlo,monospace;">pill</div><div style="font-size:10px;color:rgba(255,255,255,0.7);">button/input</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:60px;height:60px;background:#1A1A1A;border:1px solid rgba(255,255,255,0.16);border-radius:50%;"></div><div style="font-size:10px;color:rgba(255,255,255,0.5);font-family:ui-monospace,Menlo,monospace;">50%</div><div style="font-size:10px;color:rgba(255,255,255,0.7);">chip</div></div>
  </div>
</div>
</body></html>
