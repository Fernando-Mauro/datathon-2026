<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="swatch-row">
    <div class="swatch"><div class="swatch-fill" style="background:#000000"></div><div class="swatch-name">Black</div><div class="swatch-hex">#000000</div></div>
    <div class="swatch"><div class="swatch-fill" style="background:#0E0E0E"></div><div class="swatch-name">Surface 1</div><div class="swatch-hex">#0E0E0E</div></div>
    <div class="swatch"><div class="swatch-fill" style="background:#1A1A1A"></div><div class="swatch-name">Surface 2</div><div class="swatch-hex">#1A1A1A</div></div>
    <div class="swatch"><div class="swatch-fill" style="background:#1F1F1F"></div><div class="swatch-name">Surface 3</div><div class="swatch-hex">#1F1F1F</div></div>
    <div class="swatch"><div class="swatch-fill" style="background:rgba(255,255,255,0.08);outline:1px dashed rgba(255,255,255,0.2);outline-offset:-1px;"></div><div class="swatch-name">Divider</div><div class="swatch-hex">w/8%</div></div>
    <div class="swatch"><div class="swatch-fill" style="background:rgba(255,255,255,0.16);outline:1px dashed rgba(255,255,255,0.3);outline-offset:-1px;"></div><div class="swatch-name">Outline</div><div class="swatch-hex">w/16%</div></div>
  </div>
</div>
</body></html>
