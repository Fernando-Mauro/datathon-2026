<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div style="display:flex;align-items:center;gap:24px;">
    <div style="position:relative;width:120px;height:120px;flex:none;">
      <div style="position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg, #FF3D5A 0deg, #FF8A3D 50deg, #FFD93D 100deg, #4FE56F 160deg, #4FD8E0 220deg, #3478F6 280deg, #B084FF 320deg, #FF3D5A 360deg);"></div>
      <div style="position:absolute;inset:8px;border-radius:50%;background:#000;"></div>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-family:Inter, sans-serif;font-size:22px;letter-spacing:0.04em;">HAVI</div>
    </div>
    <div style="flex:1;">
      <div class="label" style="margin-bottom:6px;">HAVI ring — signature gradient</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.7);line-height:1.5;margin-bottom:8px;">The only gradient in the system. Conic spectrum: red → orange → yellow → green → cyan → blue → magenta. Black core. Subtle continuous rotation when active.</div>
      <code style="font-size:10px;color:rgba(255,255,255,0.5);">background: var(--hey-havi-grad)</code>
    </div>
  </div>
</div>
</body></html>
