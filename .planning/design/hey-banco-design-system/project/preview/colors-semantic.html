<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="swatch-row">
    <div class="swatch"><div class="swatch-fill" style="background:#FFFFFF"></div><div class="swatch-name">fg-1</div><div class="swatch-hex">#FFFFFF</div></div>
    <div class="swatch"><div class="swatch-fill" style="background:rgba(255,255,255,0.6)"></div><div class="swatch-name">fg-2</div><div class="swatch-hex">w/60%</div></div>
    <div class="swatch"><div class="swatch-fill" style="background:rgba(255,255,255,0.4)"></div><div class="swatch-name">fg-3</div><div class="swatch-hex">w/40%</div></div>
    <div class="swatch"><div class="swatch-fill" style="background:rgba(255,255,255,0.24)"></div><div class="swatch-name">disabled</div><div class="swatch-hex">w/24%</div></div>
    <div class="swatch"><div class="swatch-fill" style="background:#4FE5A1"></div><div class="swatch-name">success</div><div class="swatch-hex">#4FE5A1</div></div>
    <div class="swatch"><div class="swatch-fill" style="background:#FFB547"></div><div class="swatch-name">warning</div><div class="swatch-hex">#FFB547</div></div>
    <div class="swatch"><div class="swatch-fill" style="background:#FF5D5D"></div><div class="swatch-name">error</div><div class="swatch-hex">#FF5D5D</div></div>
  </div>
</div>
</body></html>
