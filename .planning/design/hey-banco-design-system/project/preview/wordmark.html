<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div style="display:flex;align-items:center;gap:24px;padding:8px 4px;">
    <svg viewBox="0 0 200 80" width="180" xmlns="http://www.w3.org/2000/svg"><text x="0" y="60" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="64" letter-spacing="-3" fill="#FFFFFF">hey,</text></svg>
    <div style="flex:1;">
      <div class="label" style="margin-bottom:6px;">Wordmark</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.7);line-height:1.5;">Lowercase, weight 800, tight tracking. The comma is part of the mark — never omit it. Use white-on-dark by default.</div>
    </div>
  </div>
</div>
