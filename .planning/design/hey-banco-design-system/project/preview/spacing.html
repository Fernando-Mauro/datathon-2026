<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div style="display:flex;align-items:flex-end;gap:8px;height:64px;">
    <div style="width:4px;height:4px;background:#3478F6;border-radius:2px;"></div>
    <div style="width:8px;height:8px;background:#3478F6;border-radius:2px;"></div>
    <div style="width:12px;height:12px;background:#3478F6;border-radius:2px;"></div>
    <div style="width:16px;height:16px;background:#3478F6;border-radius:2px;"></div>
    <div style="width:20px;height:20px;background:#3478F6;border-radius:2px;"></div>
    <div style="width:24px;height:24px;background:#3478F6;border-radius:2px;"></div>
    <div style="width:32px;height:32px;background:#3478F6;border-radius:2px;"></div>
    <div style="width:48px;height:48px;background:#3478F6;border-radius:2px;"></div>
    <div style="width:64px;height:64px;background:#3478F6;border-radius:2px;"></div>
  </div>
  <div style="display:flex;gap:8px;margin-top:6px;font-family:ui-monospace,Menlo,monospace;font-size:10px;color:rgba(255,255,255,0.5);">
    <span style="width:4px;text-align:center;">4</span>
    <span style="width:8px;text-align:center;">8</span>
    <span style="width:12px;text-align:center;">12</span>
    <span style="width:16px;text-align:center;">16</span>
    <span style="width:20px;text-align:center;">20</span>
    <span style="width:24px;text-align:center;">24</span>
    <span style="width:32px;text-align:center;">32</span>
    <span style="width:48px;text-align:center;">48</span>
    <span style="width:64px;text-align:center;">64</span>
  </div>
  <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:12px;">4px base grid · steps: 4 / 8 / 12 / 16 / 20 / 24 / 32 / 48 / 64</div>
</div>
</body></html>
