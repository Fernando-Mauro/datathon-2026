<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:14px;color:#fff;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-7 9 7v9a1 1 0 01-1 1h-5v-6h-6v6H4a1 1 0 01-1-1v-9z"/></svg>
      <span style="font-size:10px;color:rgba(255,255,255,0.5);">home</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v10"/></svg>
      <span style="font-size:10px;color:rgba(255,255,255,0.5);">pagos</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h14l-3-3"/><path d="M20 16H6l3 3"/></svg>
      <span style="font-size:10px;color:rgba(255,255,255,0.5);">transfer</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 13l3-7h12l3 7v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6z"/></svg>
      <span style="font-size:10px;color:rgba(255,255,255,0.5);">inbox</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M2 10h20"/></svg>
      <span style="font-size:10px;color:rgba(255,255,255,0.5);">card</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4h6l1.5 3H7.5z"/><path d="M7.5 7C5 9 3.5 12 3.5 15c0 3.5 3 6 8.5 6"/></svg>
      <span style="font-size:10px;color:rgba(255,255,255,0.5);">money</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
      <span style="font-size:10px;color:rgba(255,255,255,0.5);">user</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0014 0"/></svg>
      <span style="font-size:10px;color:rgba(255,255,255,0.5);">mic</span>
    </div>
  </div>
  <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:14px;font-family:Inter,sans-serif;">Stroke 2px · rounded caps · 24px grid · white on dark · Lucide-compatible</div>
</div>
</body></html>
