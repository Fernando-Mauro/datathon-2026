<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>hey, v2 — Conversacional</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100vh; background: #050505; font-family: "IBM Plex Sans", system-ui, sans-serif; color: #fff; }
  @keyframes haviSpin { to { transform: rotate(360deg); } }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes scaleIn { from { opacity: 0; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes growBar { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  @keyframes dotPulse { 0%, 60%, 100% { opacity: 0.4; transform: scale(0.8); } 30% { opacity: 1; transform: scale(1); } }
  *::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="SubScreens.jsx"></script>
<script type="text/babel" src="VariantAv2.jsx"></script>

<script type="text/babel">
  function Phone({ children }) {
    return <IOSDevice width={390} height={844} dark={true}>{children}</IOSDevice>;
  }

  function App() {
    return (
      <DesignCanvas title="hey, v2 — Variante A profundizada">
        <DCSection id="conv" title="Conversacional · HAVI motor central">
          <DCArtboard id="chat" label="Chat principal — sugerencias, snapshot, acciones" width={390} height={844}>
            <Phone><VariantAv2/></Phone>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
