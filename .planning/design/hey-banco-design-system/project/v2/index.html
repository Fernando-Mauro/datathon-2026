<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>hey, v2 — UX replanteado</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100vh; background: #050505; font-family: "Inter", system-ui, sans-serif; color: #fff; }
  @keyframes haviSpin { to { transform: rotate(360deg); } }
  *::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="VariantA.jsx"></script>
<script type="text/babel" src="VariantB.jsx"></script>

<script type="text/babel">
  function Phone({ children }) {
    return (
      <IOSDevice width={390} height={844} dark={true}>
        {children}
      </IOSDevice>
    );
  }

  function App() {
    return (
      <DesignCanvas title="hey, v2 — replanteo UX/UI">
        <DCSection id="home" title="Variante A · Conversacional">
          <DCArtboard id="a-home" label="HAVI es la home — la conversación es la navegación" width={390} height={844}>
            <Phone><VariantA/></Phone>
          </DCArtboard>
        </DCSection>
        <DCSection id="focus" title="Variante B · Modo foco">
          <DCArtboard id="b-home" label="Una pregunta a la vez. El gasto es el héroe." width={390} height={844}>
            <Phone><VariantB/></Phone>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
